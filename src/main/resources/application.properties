spring.application.name=subastas-api
server.port=8080

# MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/subastas?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:"ESCRIBE_AQUI_TU_PASSWORD"}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT — en producción sobreescribir con la variable de entorno JWT_SECRET
jwt.secret=${JWT_SECRET:mi-clave-secreta-de-desarrollo-local-12345}
jwt.expiration=86400000

# Mail (configurar para producción)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Multipart
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=50MB

# Uploads
app.uploads.base-path=${UPLOADS_PATH:uploads}

# Logging
logging.level.com.subastas=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.socket=INFO
