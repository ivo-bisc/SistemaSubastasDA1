
spring.application.name=subastas-api
server.port=8080

# Perfil local por defecto en desarrollo. En producción: SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# --- MySQL (local) ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/subastas?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Azure SQL (opcional — reemplazar placeholders; no commitear credenciales reales)
# spring.datasource.url=jdbc:sqlserver://<TU_SERVIDOR>.database.windows.net:1433;database=<TU_BASE>;encrypt=true;trustServerCertificate=false;loginTimeout=30
# spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
# spring.datasource.username=<TU_USUARIO>
# spring.datasource.password=${DB_PASSWORD}
# spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# JWT — definir JWT_SECRET en application-local.properties o variable de entorno
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:8081,http://10.0.2.2:8081,null}

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Mail (configurar para producción)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Multipart
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=50MB

# Uploads
app.uploads.base-path=${UPLOADS_PATH:uploads}

# Logging
logging.level.com.subastas=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.socket=INFO
